<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SpeedSkateMeet</title>
  <style>
    :root{color-scheme:dark;--navy:#0f1f3d;--orange:#f97316;--sky:#83d3ff;--text:#e5eefb;--muted:#9fb2c8}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 50% 20%,rgba(131,211,255,.14),transparent 34%),linear-gradient(135deg,#07101f,#0f1f3d 58%,#111827);font-family:Arial,Helvetica,sans-serif;color:var(--text)}
    .wrap{text-align:center;padding:32px}
    img{width:220px;max-width:70vw;margin-bottom:28px}
    h1{margin:0;font-size:42px;letter-spacing:.02em;line-height:1.05}
    p{margin:14px 0 0;color:var(--muted);font-size:18px;font-weight:800}
    .license{display:inline-flex;gap:8px;align-items:center;margin-top:22px;border:1px solid rgba(249,115,22,.35);background:rgba(249,115,22,.12);color:#fed7aa;border-radius:999px;padding:9px 14px;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}
    .pulse{width:10px;height:10px;border-radius:50%;background:var(--orange);box-shadow:0 0 0 rgba(249,115,22,.7);animation:pulse 1.4s infinite}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(249,115,22,.7)}70%{box-shadow:0 0 0 12px rgba(249,115,22,0)}100%{box-shadow:0 0 0 0 rgba(249,115,22,0)}}
  </style>
</head>
<body>
  <main class="wrap">
    <img src="../public/images/branding/ssm-logo.png" alt="SpeedSkateMeet">
    <h1>SpeedSkateMeet</h1>
    <p>Starting local meet services...</p>
    <div class="license"><span class="pulse"></span> License Status: Development Mode</div>
  </main>
</body>
</html>
